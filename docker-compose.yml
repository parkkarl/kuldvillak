services:
  kuldvillak:
    build: .
    image: kuldvillak-app
    container_name: kuldvillak-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    volumes:
      # Make new tasks (assignment + questions.json) visible without rebuilding the image.
      - ./input:/app/input:ro
